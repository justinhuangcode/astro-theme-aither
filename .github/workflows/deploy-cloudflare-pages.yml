name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: cloudflare-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || github.event.repository.name }}
  WRANGLER_VERSION: 4.76.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browser for Mermaid rendering
        run: pnpm --dir packages/aither-astro exec playwright install --with-deps chromium

      - name: Validate
        run: pnpm validate

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create project if not exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          log_file="$(mktemp)"
          if ! pnpm dlx "wrangler@${WRANGLER_VERSION}" pages project create "${CLOUDFLARE_PAGES_PROJECT_NAME}" --production-branch main 2>&1 | tee "$log_file"; then
            if grep -q "already exists" "$log_file"; then
              echo "Cloudflare Pages project already exists; continuing."
            else
              exit 1
            fi
          fi

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm dlx "wrangler@${WRANGLER_VERSION}" pages deploy dist/ --project-name="${CLOUDFLARE_PAGES_PROJECT_NAME}"
